<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Health Companion</title>
  <script type="text/javascript">
    // Store the original pathname (without the base path) in sessionStorage
    // so the React app can navigate to it after loading
    var pathname = window.location.pathname;
    var basePath = '/Health-Companion-Super-App/';
    var route = pathname.replace(basePath, '/');
    
    // Only store if it looks like an app route (not a static file)
    if (route && route !== '/' && !route.includes('.html') && !route.includes('.')) {
      sessionStorage.setItem('pendingPath', route);
    }
    
    // Redirect to the home page, React will handle navigation
    window.location.replace(basePath);
  </script>
</head>
<body>
  <p>Loading app...</p>
</body>
</html>
