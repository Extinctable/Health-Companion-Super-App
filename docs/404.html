<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Health Companion</title>
  <script type="text/javascript">
    // This script handles client-side routing for single-page applications on GitHub Pages.
    // When a route is not found (404), redirect to index.html, which allows React Router
    // to properly handle the navigation client-side.
    
    var path = window.location.pathname;
    var basePath = '/Health-Companion-Super-App/';
    
    // Store the intended path + query + hash in sessionStorage
    sessionStorage.redirect = path + window.location.search + window.location.hash;
    
    // Redirect to index.html
    window.location.replace(basePath + '?redirect=' + encodeURIComponent(path));
  </script>
</head>
<body>
  <p>Loading app...</p>
</body>
</html>
